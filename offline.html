<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#1A1A2E"/>
  <title>dbarrio — sin conexión</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--y:#F5C116;--ink:#1A1A2E;--f:'system-ui',sans-serif}
    html,body{height:100%;background:var(--ink);font-family:var(--f)}
    body{display:flex;align-items:center;justify-content:center;padding:24px}
    .card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
      border-radius:24px;
      padding:40px 32px;
      text-align:center;
      max-width:320px;
      width:100%;
    }
    .icon{font-size:56px;margin-bottom:20px;display:block}
    .title{
      font-family:'Barlow Condensed',impact,sans-serif;
      font-size:32px;
      font-weight:900;
      color:#fff;
      margin-bottom:10px;
      letter-spacing:-.5px;
    }
    .title span{color:var(--y)}
    .desc{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:28px}
    .btn{
      display:block;width:100%;padding:14px;
      background:var(--y);color:var(--ink);
      border:none;border-radius:12px;
      font-size:15px;font-weight:700;
      font-family:var(--f);cursor:pointer;
    }
    .btn:active{opacity:.88}
    .hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:16px;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <div class="title"><span>d</span>barrio</div>
    <p class="desc">Sin conexión a internet.<br>Revisá tu red e intentá de nuevo.</p>
    <button class="btn" onclick="location.reload()">Reintentar</button>
    <p class="hint">Tus datos están seguros.<br>Se sincronizarán cuando vuelva la conexión.</p>
  </div>
</body>
</html>
