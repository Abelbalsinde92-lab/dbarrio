  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --y:#F5C116;--yd:#C9980D;--yl:#FFF8DC;
      --ink:#1C1C2E;--ink2:#2E2E45;--ink3:#454562;
      --bg:#ECEAE5;--card:#FFFFFF;--line:#E0DDD7;
      --g1:#6B6B7E;--g2:#A8A4A0;
      --err:#D63031;--ok:#00856F;--wa:#25D366;
      --r:14px;--rs:10px;
      --f:'Outfit',sans-serif;--fd:'Barlow Condensed',sans-serif;
    }

    html,body{height:100%;overflow:hidden}
    body{display:flex;flex-direction:column;background:var(--bg);color:var(--ink);font-family:var(--f);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

    /* ===== TOPBAR FIX + KPI LOOK ===== */
    .topbar{
      background:var(--ink);
      height:54px;flex-shrink:0;
      display:flex;align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 16px;
      padding-top:env(safe-area-inset-top,0);
      z-index:30;
    }
    .topbar-logo{display:flex;align-items:flex-end;gap:8px;flex:0 0 auto}
    .logo-db{font-family:var(--fd);font-size:32px;font-weight:900;color:var(--y);letter-spacing:-3px;line-height:.85}
    .logo-tag{font-size:9px;font-weight:700;color:rgba(255,255,255,.28);letter-spacing:2px;padding-bottom:3px}

    .topbar-right{display:flex;align-items:center;gap:12px;flex:1;min-width:0;justify-content:flex-end}
    .kpi-bar{
      display:flex;align-items:center;gap:10px;
      overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
      flex:1;min-width:0;padding:2px 0;
      mask-image:linear-gradient(to right, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
    }
    .kpi-bar::-webkit-scrollbar{display:none}

    .kpi{
      height:40px;min-width:74px;padding:6px 12px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      flex:0 0 auto;
    }
    .kpi-n{
      font-family:var(--fd);
      font-size:22px;font-weight:900;line-height:1;
      color:var(--y);
      font-variant-numeric: tabular-nums;
      letter-spacing:.2px;
    }
    .kpi-l{
      font-size:10px;font-weight:800;line-height:1;
      color:rgba(255,255,255,.35);
      letter-spacing:.6px;text-transform:uppercase;
    }
    .btn-exit{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:9px 14px;
      font-size:12px;font-weight:800;
      color:rgba(255,255,255,.65);
      cursor:pointer;white-space:nowrap;
      flex:0 0 auto;
    }
    .btn-exit:active{transform:scale(.98)}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function dbc(id) { return 'db-' + id }
function fmt(ts) { if (!ts) return '—'; const d=new Date(ts); return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) }
function fmtD(ts) { if (!ts) return '—'; const d=new Date(ts); return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'}) }
function fmtM(n) { return n != null ? '$'+parseFloat(n).toFixed(2) : '—' }
function stars(v, n=5) {
  return Array.from({ length:n }, (_, i) =>
    `<span class="star-r${i < (v || 0) ? ' on' : ''}">★</span>`
  ).join('');
}
function setT(id, v) {
  const e = document.getElementById(id);
  if (e) e.textContent = v;
}

function toast(msg, dur=2500) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function wa(num, msg) {
  const url = 'https://wa.me/' + String(num || '').replace(/\D/g,'') + '?text=' + encodeURIComponent(msg || '');
  const w = window.open(url, '_blank');
  if (!w) window.location.href = url; // fallback iOS/Safari
}
function copyCompMsg(){
  const ta = document.getElementById('comp-msg');
  const txt = ta?.value?.trim();
  if (!txt) return toast('No hay mensaje');

  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(txt)
      .then(()=>toast('Mensaje copiado'))
      .catch(()=>fallbackCopy(ta));
  } else {
    fallbackCopy(ta);
  }
}

function fallbackCopy(ta){
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    toast('Mensaje copiado');
  } catch (e) {
    toast('Mantén presionado y copia manual');
  }
}

function sendCompMsgWA(){
  if (!pendingCompTel || !pendingCompMsg) 
    return toast('Falta teléfono o mensaje');

  wa(pendingCompTel, pendingCompMsg);
}

  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  closeSidebar();
  if (id==='hi') loadHi();
  if (id==='so') { loadSociosMap(); loadSocios(); }
  if (id==='ca') loadCaja();
  if (id==='sp') loadSoporte();
}

async function loadKPIs() {
  const [{ data: solic }, { data: movs }] = await Promise.all([
    sb.from('solicitudes').select('estado'),
    sb.from('movimientos').select('monto').eq('tipo','cargo_comision')
  ]);

  const s = solic || [];
  const pend = s.filter(x=>x.estado==='pendiente').length;
  const asig = s.filter(x=>x.estado==='asignada').length;
  const comp = s.filter(x=>x.estado==='completada').length;

  const ing = (movs||[]).reduce((a,m)=>a+parseFloat(m.monto||0),0);
  const caja = Number.isFinite(ing) ? ing : 0;

  // ✅ usa tus IDs reales
  setKpis({ pend, asig, comp, caja });
}

async function loadOp() {
  const el = document.getElementById('lista-op');
  el.innerHTML = '<div class="loading">Cargando...</div>';
  await loadSociosMap();
  const { data, error } = await sb.from('solicitudes')
    .select('*').in('estado',['pendiente','asignada'])
    .order('created_at',{ascending:true});
  if (error) { el.innerHTML = `<div class="empty"><div class="empty-ico">⚠</div>Error: ${esc(error.message)}</div>`; return }
  if (!data?.length) { el.innerHTML = '<div class="empty"><div class="empty-ico">✓</div>Sin ordenes activas</div>'; return }
  el.innerHTML = data.map(buildCardOp).join('');

function buildCardOp(s) {
  const socioNom = s.socio_asignado && sociosMap[s.socio_asignado]
    ? sociosMap[s.socio_asignado].nombre
    : null;

  const socioTel = s.socio_asignado && sociosMap[s.socio_asignado]
    ? sociosMap[s.socio_asignado].telefono
    : null;

  const telLimpio = (s.telefono || '').replace(/\s/g, '');

  const cierreReportado =
    (s.sub_estado === 'cierre_reportado') ||
    (s.monto_socio != null);

  const rechazoSocio = (s.sub_estado === 'rechazada_por_socio');

  // 🔹 “visual” = lo que se ve en el chip
  const visual =
    (s.estado === 'asignada' && rechazoSocio) ? 'rechazada_por_socio' :
    (s.estado === 'asignada' && cierreReportado) ? 'cierre_reportado' :
    (s.estado === 'asignada' && s.sub_estado === 'en_proceso') ? 'en_proceso' :
    s.estado;

  const chipClass = {
    pendiente: 'cp',
    asignada: 'ca',
    en_proceso: 'ce',
    cierre_reportado: 'cc',
    rechazada_por_socio: 'cr',
    completada: 'cc',
    rechazada: 'cr'
  }[visual] || 'cp';

  const chipText = {
    pendiente: 'pendiente',
    asignada: 'asignada',
    en_proceso: 'en proceso',
    cierre_reportado: 'cierre reportado',
    rechazada_por_socio: 'rechazo socio',
    completada: 'completada',
    rechazada: 'rechazada'
  }[visual] || visual;

  const cierreFlag = cierreReportado
    ? `<div style="background:#E2F7EE;border:1px solid #9BD4A8;border-radius:8px;padding:8px 12px;margin-top:10px;font-size:12px;font-weight:700;color:#155724">
         ✅ Cierre reportado por el socio
         ${s.monto_socio != null ? `<div style="margin-top:4px">Monto: ${fmtM(s.monto_socio)}</div>` : ``}
         ${s.garantia_dias != null ? `<div>Garantía: ${s.garantia_dias} días</div>` : ``}
       </div>`
    : '';

  const rechazoFlag = rechazoSocio
    ? `<div style="background:#FFF5F5;border:1px solid #FCA5A5;border-radius:8px;padding:8px 12px;margin-top:10px;font-size:12px;font-weight:700;color:#721C24">
         ❌ Rechazada por el socio
         <div style="margin-top:6px;font-weight:600">
           ${esc(s.motivo_rechazo_socio || s.nota_socio || 'Sin motivo')}
         </div>
       </div>`
    : '';

  // ✅ Selector de socio solo si está pendiente
  let asignarHTML = '';
  if (s.estado === 'pendiente') {
    const opts = Object.values(sociosMap)
      .filter(sc => sc && sc.nombre)
      .map(sc => `<option value="${sc.id}">${esc(sc.nombre)}</option>`)
      .join('');

    asignarHTML = `
      <div class="inline-form" style="margin-top:10px">
        <label>Asignar socio</label>
        <div style="display:flex;gap:8px;margin-top:4px">
          <select id="sel-${s.id}" style="flex:1">
            ${opts ? `<option value="">-- Seleccionar --</option>${opts}` : `<option value="">Sin socios</option>`}
          </select>
          <button class="btn btn-y btn-sm" onclick="asignar(${s.id})">Asignar</button>
        </div>
      </div>`;
  }

  const btnCompletar =
    (s.estado === 'asignada' && cierreReportado)
      ? `<button class="btn btn-y" onclick="openCompletar(${s.id})">Aprobar y enviar garantía</button>`
      : '';

  const btnLiberar =
    (s.estado === 'asignada' && rechazoSocio)
      ? `<button class="btn btn-g" onclick="liberarPorRechazo(${s.id})">Liberar / volver a pendiente</button>`
      : '';

  const btnRechazar =
    `<button class="btn btn-r" onclick="openRechazar(${s.id})">Rechazar</button>`;

  const btnWASocio = socioTel
    ? `<button class="btn btn-wa" onclick="waSocioAsignado(${s.id})">WA socio</button>`
    : '';

  return `
  <div class="card" id="card-${s.id}">
    <div class="card-hdr" onclick="toggleCard(this)">
      <div class="card-hdr-left">
        <div class="card-meta">
          <span class="card-code">${esc(dbc(s.id))}</span>
          <span class="chip ${chipClass}">${esc(chipText)}</span>
        </div>
        <span class="card-name">${esc(s.cliente)}</span>
        <span class="card-detail">${esc(s.municipio || '')} · ${esc(s.servicio || '')}</span>
      </div>
      <svg class="card-chevron" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>

    <div class="card-body">
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Fecha</span>
          <span class="info-val">${fmt(s.fecha_ts)}</span>
        </div>

        <div class="info-item">
          <span class="info-label">Servicio</span>
          <span class="info-val">${esc(s.servicio || '—')}</span>
        </div>

        <div class="info-item info-full">
          <span class="info-label">Teléfono</span>
          <a href="tel:${esc(telLimpio)}" class="call-link">
            ${esc(s.telefono || '—')}
          </a>
        </div>

        ${socioNom
          ? `<div class="info-item">
               <span class="info-label">Socio</span>
               <span class="info-val">${esc(socioNom)}</span>
             </div>`
          : ''
        }
      </div>

      ${cierreFlag}
      ${rechazoFlag}
      ${asignarHTML}

      <div class="actions-row" style="margin-top:10px;flex-wrap:wrap">
        ${btnCompletar}
        ${btnLiberar}
        ${btnWASocio}
        ${btnRechazar}
      </div>
    </div>
  </div>`;
}

async function asignar(id) {
  const sel = document.getElementById('sel-'+id);
  if (!sel?.value) { toast('Selecciona un socio'); return }
  const socioId = parseInt(sel.value);
  const { error } = await sb.from('solicitudes').update({
    socio_asignado: socioId, estado: 'asignada'
  }).eq('id', id);
  if (error) { toast('Error: '+error.message); return }
  toast('Orden asignada');
  // Abrir WA automáticamente
  const { data: sol } = await sb.from('solicitudes').select('*').eq('id',id).single();
  if (sol && sociosMap[socioId]) {
    const soc = sociosMap[socioId];
    const msg = CFG.t1
      .replace('{socio}', soc.nombre)
      .replace('{code}', dbc(id))
      .replace('{cliente}', sol.cliente||'')
      .replace('{municipio}', sol.municipio||'')
      .replace('{telefono}', sol.telefono||'')
      .replace('{servicio}', sol.servicio||'')
      .replace('{detalles}', sol.detalles||'Sin detalles');
    if (soc.telefono) wa(soc.telefono, msg);
  }
  loadOp();
}

async function liberarPorRechazo(id) {
  const ok = confirm('¿Liberar la orden y devolverla a pendiente?');
  if (!ok) return;

  const { error } = await sb.from('solicitudes').update({
    estado: 'pendiente',
    socio_asignado: null,
    sub_estado: null,
    motivo_rechazo_socio: null
  }).eq('id', id);

  if (error) { toast('Error: ' + error.message); return; }

  toast('Orden liberada');
  loadOp();
  loadKPIs();
}

async function openCompletar(id) {
  pendingCompId = id;

  // limpiar estado UI
  const e = document.getElementById('err-comp');
  if (e) { e.textContent = ''; e.classList.remove('v'); }

  const { data: sol, error } = await sb
    .from('solicitudes')
    .select('*')
    .eq('id', id)
    .single();

  if (error || !sol) { toast('No pude cargar la orden'); return; }

  if (sol.monto_socio == null) {
    toast('El socio aún no reportó el cierre (monto).');
    return;
  }

  // Prefill inputs
  document.getElementById('comp-monto').value = sol.monto_socio ?? '';
  document.getElementById('comp-gar').value   = sol.garantia_dias ?? 0;
  document.getElementById('comp-nota').value  = sol.nota_socio ?? '';

  // ✅ construir preview del mensaje (ANTES de cerrar)
  const garDias = sol.garantia_dias != null ? parseInt(sol.garantia_dias, 10) : 0;

  let finGarISO = null;
  if (garDias > 0) {
    const fin = new Date();
    fin.setDate(fin.getDate() + garDias);
    finGarISO = fin.toISOString();
  }

  const socioNom = sol.socio_asignado
    ? (sociosMap[sol.socio_asignado]?.nombre || '—')
    : '—';

  const venceTxt = finGarISO
    ? new Date(finGarISO).toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric' })
    : 'No aplica';

  const garTxt = garDias > 0 ? `${garDias} días` : 'Sin garantía';
  const detallesTxt = sol?.nota_socio || '—';

  const msgCli = (CFG.t3 || '')
    .replaceAll('{cliente}', sol?.cliente || '')
    .replaceAll('{code}', dbc(id))
    .replaceAll('{socio}', socioNom)
    .replaceAll('{monto}', fmtM(sol.monto_socio))
    .replaceAll('{garantia}', garTxt)
    .replaceAll('{vence}', venceTxt)
    .replaceAll('{detalles}', detallesTxt);

  pendingCompMsg = msgCli;
  pendingCompTel = sol?.telefono || null;

  const ta = document.getElementById('comp-msg');
  if (ta) ta.value = msgCli;

  openModal('comp');
}
function openRechazar(id) { pendingRechId=id; document.getElementById('rech-mot').value=''; document.getElementById('err-rech').classList.remove('v'); openModal('rech') }

// ✅ REEMPLAZA TU FUNCIÓN ENTERA doCompletar() POR ESTA (admin)

async function doCompletar() {
  const btn = document.getElementById('btn-comp');
  const resetBtn = () => { btn.disabled = false; btn.innerHTML = 'Confirmar y cerrar orden'; };
  const err = (msg) => {
    const e = document.getElementById('err-comp');
    e.textContent = msg;
    e.classList.add('v');
    resetBtn();
  };

  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>Procesando...';

  if (!pendingCompId) return err('Orden inválida.');

  const now = new Date().toISOString();

  // 1) Traer la solicitud (sin join raro)
  const { data: sol, error: es } = await sb
    .from('solicitudes')
    .select('*')
    .eq('id', pendingCompId)
    .single();

  if (es || !sol) return err(es?.message || 'No se pudo cargar la orden.');

  // 2) Validar cierre reportado por el socio
  const monto = sol.monto_socio != null ? parseFloat(sol.monto_socio) : NaN;
  if (isNaN(monto) || monto < 0) return err('El socio no reportó un monto válido.');

  const garDias = sol.garantia_dias != null ? parseInt(sol.garantia_dias, 10) : 0;
  if (isNaN(garDias) || garDias < 0) return err('Garantía inválida reportada por el socio.');

  // 3) Calcular vencimiento garantía
  let finGarISO = null;
  if (garDias > 0) {
    const fin = new Date();
    fin.setDate(fin.getDate() + garDias);
    finGarISO = fin.toISOString();
  }

  // 4) Nota admin (opcional)
  const notaAdmin = document.getElementById('comp-nota')?.value?.trim() || null;

  // 5) Marcar completada en solicitudes
  const { error: eu } = await sb.from('solicitudes').update({
    estado: 'completada',
    fecha_fin: now,
    monto: monto,
    nota_admin: notaAdmin,
    garantia_dias: garDias,
    garantia_expira: finGarISO,
    solicita_cierre: false,
    cierre_ts: now,
    sub_estado: null
  }).eq('id', pendingCompId);

  if (eu) return err(eu.message);

  // 6) Comisión / deuda socio (fetch socio real)
  let socio = null;
  if (sol.socio_asignado) {
    const { data: soc, error: se } = await sb
      .from('socios')
      .select('id,nombre,telefono,comision,deuda,trabajos')
      .eq('id', sol.socio_asignado)
      .single();

    if (se) return err('No pude cargar el socio para comisiones: ' + se.message);
    socio = soc;

    const comPct = (socio?.comision ?? CFG.com);
    const comMonto = parseFloat((monto * comPct / 100).toFixed(2));

    // movimiento
    const { error: me } = await sb.from('movimientos').insert({
      socio_id: socio.id,
      solicitud_id: pendingCompId,
      tipo: 'cargo_comision',
      monto: comMonto,
      nota: `Comisión ${comPct}% — ${dbc(pendingCompId)}`
    });
    if (me) return err('Movimiento comisión: ' + me.message);

    // actualizar socio
    const nuevaDeuda = (parseFloat(socio.deuda || 0) + comMonto);
    const nuevosTrab = (parseInt(socio.trabajos || 0, 10) + 1);

    const { error: sue } = await sb.from('socios').update({
      deuda: nuevaDeuda.toFixed(2),
      trabajos: nuevosTrab
    }).eq('id', socio.id);

    if (sue) return err('Actualizando socio: ' + sue.message);
  }

  // 6.1) (OPCIONAL pero recomendado) Registrar garantía en tabla "garantias"
  // Si NO tienes esa tabla o no la usas, borra este bloque.
  try {
    await sb.from('garantias').insert({
      recibo: dbc(pendingCompId),
      telefono: sol.telefono || null,
      falla: null,
      estado: 'activa',
      garantia_dias: garDias,
      garantia_expira: finGarISO,
      socio_id: sol.socio_asignado || null
    });
  } catch(_) {}

  // 7) WhatsApp cliente = “enviar garantía”
  const socNom = socio?.nombre || (sol.socio_asignado ? (sociosMap[sol.socio_asignado]?.nombre || '—') : '—');

  const venceTxt = finGarISO
    ? new Date(finGarISO).toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric' })
    : 'No aplica';

  const garTxt = garDias > 0 ? `${garDias} días` : 'Sin garantía';
  const detallesTxt = sol?.nota_socio || '—';

  // IMPORTANTE: asegúrate de que CFG.t3 tenga estos tokens.
  const msgCli = (CFG.t3 || '')
    .replaceAll('{cliente}', sol?.cliente || '')
    .replaceAll('{code}', dbc(pendingCompId))
    .replaceAll('{socio}', socNom)
    .replaceAll('{monto}', fmtM(monto))
    .replaceAll('{garantia}', garTxt)
    .replaceAll('{vence}', venceTxt)
    .replaceAll('{detalles}', detallesTxt);

  if (document.getElementById('sec-hi')?.classList.contains('active')) {
  loadHi();
}
  // 8) UI final
  pendingCompId = null;
  closeModal('comp');
  toast('Orden completada y garantía enviada');
  resetBtn();
  loadOp();
  loadKPIs();
}

async function doRechazar() {
  const mot = document.getElementById('rech-mot').value.trim();
  if (!mot) { const e=document.getElementById('err-rech'); e.textContent='Ingresa el motivo.'; e.classList.add('v'); return }
  const { error } = await sb.from('solicitudes').update({
    estado:'rechazada', motivo_rechazo:mot
  }).eq('id', pendingRechId);
  if (error) { const e=document.getElementById('err-rech'); e.textContent=error.message; e.classList.add('v'); return }
  closeModal('rech'); toast('Orden rechazada'); loadOp(); loadKPIs();
}

async function waSocioAsignado(id) {

    .replace('{servicio}', sol.servicio||'')

async function loadHi() {
  const el = document.getElementById('lista-hi');
  el.innerHTML = '<div class="loading">Cargando...</div>';

  await loadSociosMap();

  const cli = document.getElementById('f-cli').value.trim();
  const cod = document.getElementById('f-cod').value.trim();
  const d1  = document.getElementById('f-d1').value;
  const d2  = document.getElementById('f-d2').value;

  let q = sb.from('solicitudes')
    .select('*')
    .eq('estado','completada')
    .not('fecha_fin','is', null)
    .order('fecha_fin',{ascending:false})
    .limit(100);

  if (cli) q = q.ilike('cliente','%'+cli+'%');

  if (cod) {
    const n = parseInt(cod.replace(/^db-/i,''));
    if (!isNaN(n)) q = q.eq('id', n);
  }

  if (d1) q = q.gte('fecha_fin', d1);
  if (d2) q = q.lte('fecha_fin', d2 + 'T23:59:59');

  const { data, error } = await q;

  if (error) {
    el.innerHTML = `<div class="empty">Error: ${esc(error.message)}</div>`;
    return;
  }

  if (!data?.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">○</div>Sin resultados</div>';
    return;
  }

  el.innerHTML = data.map(s => {
    const socNom = s.socio_asignado && sociosMap[s.socio_asignado]
      ? sociosMap[s.socio_asignado].nombre
      : '—';

    let garantiaHTML = '';
    if (s.garantia_dias != null) {
      const hoy = new Date();
      const expira = s.garantia_expira ? new Date(s.garantia_expira) : null;
      const vencida = expira ? expira < hoy : false;

      garantiaHTML = `
        <div style="margin-top:6px;font-size:12px">
          🛡 Garantía: ${s.garantia_dias} días
          ${expira ? ` · Vence: ${expira.toLocaleDateString('es-ES')}` : ''}
          ${vencida ? ` <span style="color:#D63031;font-weight:700">(VENCIDA)</span>` : ''}
        </div>
      `;
    }

    return `
<div class="hist-card">
  <div class="hist-row">
    <div>
      <div class="hist-code">${esc(dbc(s.id))}</div>
      <div class="hist-meta">${esc(s.cliente)} · ${esc(socNom)}</div>
    </div>
    <div style="text-align:right">
      <div class="hist-monto">${fmtM(s.monto)}</div>
      <div class="hist-meta">${fmtD(s.fecha_fin)}</div>
    </div>
  </div>

  <div class="hist-meta" style="margin-top:6px">
    ${esc(s.municipio||'')} · ${esc(s.servicio||'')}
  </div>

  ${s.valoracion ? `<div class="stars-r" style="margin-top:6px">${stars(s.valoracion)}</div>` : ''}

  ${garantiaHTML}
</div>`;
  }).join('');
}

async function loadSocios() {
  const el = document.getElementById('lista-so');
    // DIAG: comprobar sesión real (JWT)
  const { data: u, error: ue } = await sb.auth.getUser();
  if (ue || !u?.user) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">🔒</div>Sesión no válida. Vuelve a iniciar sesión.</div>`;
    return;
  }
  el.innerHTML = '<div class="loading">Cargando...</div>';
  const { data, error } = await sb.from('socios').select('*').order('estado_socio').order('nombre');
  if (error) { el.innerHTML = `<div class="empty">Error: ${esc(error.message)}</div>`; return }
  if (!data?.length) { el.innerHTML = '<div class="empty">Sin socios registrados</div>'; return }
  // Pendientes primero
  const pend = data.filter(x => (!x.admitido && x.estado_socio !== 'rechazado') || x.estado_socio === 'pendiente');
  const rest = data.filter(x=>x.admitido && x.estado_socio!=='pendiente');
  let html = '';
  if (pend.length) html += `<div style="font-family:var(--fd);font-size:15px;font-weight:800;color:var(--y);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Pendientes de aprobacion</div>` + pend.map(buildSocioCard).join('');
  if (rest.length) { if (pend.length) html += `<div style="font-family:var(--fd);font-size:15px;font-weight:800;color:var(--g1);margin:12px 0 8px;text-transform:uppercase;letter-spacing:1px">Activos / Baja</div>`; html += rest.map(buildSocioCard).join(''); }
  el.innerHTML = html;
}

function buildSocioCard(s) {
  const est = s.admitido ? (s.estado_socio||'activo') : 'pendiente';
  const r = s.rating_avg ? Math.round(parseFloat(s.rating_avg)) : 0;
  const starsSoc = Array.from({length:5},(_,i)=>`<span class="star-r${i<r?' on':''}">★</span>`).join('');
  const chipCls = {activo:'ca',pendiente:'cp',baja:'cr'}[est]||'cp';
  const telLimpio = (s.telefono||'').replace(/\s/g,'');
  return `
<div class="socio-card ${est}" id="sc-${s.id}">
  <div class="socio-hdr" onclick="toggleSocioCard(this)">
    <div class="socio-hdr-left">
      <span class="socio-name">${esc(s.nombre)}</span>
      <span class="socio-meta">${esc(s.especialidad||'')} · ${esc(s.zona||'')}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="chip ${chipCls}">${est}</span>
      <svg class="card-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>
  <div class="socio-body">
    <div class="info-grid">
      <div class="info-item"><span class="info-label">Telefono</span>
        <a href="tel:${esc(telLimpio)}" class="call-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.01 2.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>${esc(s.telefono||'—')}</a>
      </div>
      <div class="info-item"><span class="info-label">Email</span><span class="info-val">${esc(s.email||'—')}</span></div>
      <div class="info-item"><span class="info-label">Deuda</span><span class="info-val" style="color:${(s.deuda||0)>0?'var(--err)':'var(--ok)'}">${fmtM(s.deuda)}</span></div>
      <div class="info-item"><span class="info-label">Trabajos</span><span class="info-val">${s.trabajos||0}</span></div>
      <div class="info-item">
  <span class="info-label">Rating</span>
  <span class="info-val">
    ${s.rating_avg ? parseFloat(s.rating_avg).toFixed(1)+' ★' : '—'}
    ${s.rating_avg ? `<div class="stars-r" style="margin-top:4px">${starsSoc}</div>` : ''}
  </span>
</div>
      <div class="info-item"><span class="info-label">Comision</span><span class="info-val">${s.comision||15}%</span></div>
    </div>
    <div class="inline-form" style="margin-top:10px">
      <label>Ajustar comision (%)</label>
      <div style="display:flex;gap:8px;margin-top:4px">
        <input id="com-${s.id}" type="number" min="0" max="100" value="${s.comision||15}" style="max-width:100px"/>
        <button class="btn btn-g btn-sm" onclick="saveComSocio(${s.id})">Guardar</button>
      </div>
    </div>
    <div class="actions-row" style="margin-top:10px;flex-wrap:wrap">
      ${!s.admitido ? `<button class="btn btn-y" onclick='aprobarSocio(${s.id}, ${JSON.stringify(s.nombre||"")}, ${JSON.stringify(s.telefono||"")})'>Aprobar</button>` : ''}
      ${!s.admitido ? `<button class="btn btn-r btn-sm" onclick="rechazarSocio(${s.id})">Rechazar</button>` : ''}
      ${s.estado_socio==='activo' ? `<button class="btn btn-r btn-sm" onclick="cambiarEstadoSocio(${s.id},'baja')">Dar de baja</button>` : ''}
      ${s.estado_socio==='baja' ? `<button class="btn btn-g btn-sm" onclick="cambiarEstadoSocio(${s.id},'activo')">Reactivar</button>` : ''}
      ${s.telefono ? `<button class="btn btn-wa btn-sm" onclick='waAdmin(${JSON.stringify(s.telefono||"")}, ${JSON.stringify(`Hola ${s.nombre||""}, te contacta el equipo dbarrio.`)})'>WA</button>` : ''}
    </div>
  </div>
</div>`;
}

async function aprobarSocio(id, nombre, telefono) {
  const { error } = await sb.from('socios').update({admitido:true,estado_socio:'activo'}).eq('id',id);
  if (error) { toast('Error: '+error.message); return }
  toast('Socio aprobado');
  if (telefono) {
    const msg = CFG.t2.replace('{socio}', nombre);
    wa(telefono, msg);
  }
  loadSocios(); loadSociosMap();
}

async function cambiarEstadoSocio(id, est) {
  const { error } = await sb.from('socios').update({estado_socio:est}).eq('id',id);
  if (error) { toast('Error: '+error.message); return }
  toast(est==='activo'?'Socio reactivado':'Socio dado de baja');
  loadSocios(); loadSociosMap();
}

async function saveComSocio(id) {
  const val = parseFloat(document.getElementById('com-'+id).value);
  if (isNaN(val)) { toast('Valor invalido'); return }
  const { error } = await sb.from('socios').update({comision:val}).eq('id',id);
  if (error) { toast('Error: '+error.message); return }
  toast('Comision actualizada'); loadSociosMap();
}

async function rechazarSocio(socioId){
  if(!confirm('¿Rechazar este candidato?')) return;

  // (opcional) feedback inmediato
  toast('Procesando...');

  const { error } = await sb
    .from('socios')
    .update({
      estado_socio: 'rechazado',
      admitido: false
    })
    .eq('id', socioId);

  if(error){
    toast('Error al rechazar: ' + error.message);
    return;
  }

  toast('Candidato rechazado');
  await loadSocios();     // ✅ refresca UI
  await loadSociosMap();  // ✅ actualiza cache
}

function waAdmin(tel, msg) { wa(tel, msg) }

// ══════════════════════════════════════════
// CAJA
// ══════════════════════════════════════════
async function loadCaja() {
  await loadSociosMap();
  // Socios con deuda
  const { data: socs } = await sb.from('socios').select('id,nombre,telefono,deuda').gt('deuda',0).order('deuda',{ascending:false});
  const elC = document.getElementById('lista-ca');
  if (!socs?.length) {
    elC.innerHTML = '<div class="empty">Sin socios con deuda pendiente</div>';
  } else {
    elC.innerHTML = socs.map(s => `
<div class="caja-card">
  <div class="caja-hdr">
    <div><div class="caja-nombre">${esc(s.nombre)}</div><div class="caja-sub">${s.telefono||'Sin telefono'}</div></div>
    <div style="text-align:right"><div class="caja-deuda">${fmtM(s.deuda)}</div><div class="caja-sub">Deuda</div></div>
  </div>
  <div class="actions-row" style="margin-top:10px;flex-wrap:wrap">
    <button class="btn btn-y btn-sm" onclick="openCaja(${s.id},'liquidar')">Liquidar todo</button>
    <button class="btn btn-g btn-sm" onclick="openCaja(${s.id},'pago')">Registrar pago</button>
    <button class="btn btn-g btn-sm" onclick="openCaja(${s.id},'ajuste')">Ajuste</button>
    ${(s.telefono && parseFloat(s.deuda)>0)
  ? `<button class="btn btn-wa btn-sm" onclick="waCobro(${s.id})">Contactar</button>`
  : ''}
  </div>
</div>`).join('');
  }
  // Select de socios para filtro movimientos
  const selSoc = document.getElementById('f-ca-soc');
  const prevVal = selSoc.value;
  selSoc.innerHTML = '<option value="">Todos los socios</option>' + Object.values(sociosMap).filter(Boolean).map(s=>`<option value="${s.id}" ${s.id==prevVal?'selected':''}>${esc(s.nombre)}</option>`).join('');
  loadMovs();
}

function openCaja(id, tipo) {
  pendingCajaId=id; pendingCajaTipo=tipo;
  const titles={liquidar:'Liquidar deuda',pago:'Registrar pago',ajuste:'Ajuste manual'};
  setT('caja-title', titles[tipo]||'Movimiento');
  document.getElementById('caja-monto').value='';
  document.getElementById('caja-nota').value='';
  document.getElementById('err-caja').classList.remove('v');
  openModal('caja');
}

async function doCajaOp() {
  const monto = parseFloat(document.getElementById('caja-monto').value);
  const nota  = document.getElementById('caja-nota').value.trim();
  if (isNaN(monto)||monto<=0) { const e=document.getElementById('err-caja'); e.textContent='Ingresa un monto valido.'; e.classList.add('v'); return }
  const btn=document.getElementById('btn-caja'); btn.disabled=true; btn.innerHTML='<span class="sp"></span>';

  const { data: soc } = await sb.from('socios').select('deuda,nombre').eq('id',pendingCajaId).single();
  const deudaActual = parseFloat(soc?.deuda||0);
  let nuevaDeuda = deudaActual;
  let tipo = pendingCajaTipo;

  if (tipo==='liquidar') { nuevaDeuda=0; }
  else if (tipo==='pago') { nuevaDeuda=Math.max(0,deudaActual-monto); }
  else { nuevaDeuda=deudaActual+monto; tipo='ajuste'; }

  await sb.from('movimientos').insert({
    socio_id:pendingCajaId, tipo:tipo, monto:monto,
    nota:nota||(tipo==='liquidar'?`Liquidacion total — ${soc?.nombre}`:`${tipo} — ${soc?.nombre}`)
  });
  await sb.from('socios').update({deuda:nuevaDeuda.toFixed(2)}).eq('id',pendingCajaId);

  btn.disabled=false; btn.innerHTML='Confirmar';
  closeModal('caja'); toast('Movimiento registrado'); loadCaja();
}

async function loadMovs() {
  const el = document.getElementById('lista-movs');
  el.innerHTML = '<div class="loading">Cargando...</div>';
  const socId = document.getElementById('f-ca-soc').value;
  let q = sb.from('movimientos').select('*').order('created_at',{ascending:false}).limit(50);
  if (socId) q = q.eq('socio_id', parseInt(socId));
  const { data, error } = await q;
  if (error) { el.innerHTML=`<div class="empty">Error: ${esc(error.message)}</div>`; return }
  if (!data?.length) { el.innerHTML='<div class="empty">Sin movimientos</div>'; return }
  el.innerHTML = data.map(m => {
    const socNom = sociosMap[m.socio_id]?.nombre||'—';
    const esPago = ['pago','ajuste_negativo'].includes(m.tipo);
    return `
<div class="mov-item">
  <div class="mov-left">
    <span class="mov-tipo">${esc(m.tipo.replace(/_/g,' '))} · ${esc(socNom)}</span>
    <span class="mov-nota">${esc(m.nota||'')} · ${fmt(m.created_at)}</span>
  </div>
  <span class="mov-monto ${esPago?'pago':'cargo'}">${esPago?'-':'+'} ${fmtM(m.monto)}</span>
</div>`}).join('');
}

async function waCobro(id) {
  const soc = sociosMap[id];
  if (!soc?.telefono) { toast('Sin teléfono'); return; }

  const { data, error } = await sb.from('socios').select('deuda').eq('id', id).single();
  if (error) { toast('Error: ' + error.message); return; }

  const deuda = parseFloat(data?.deuda || 0);

  const msg =
`Hola ${soc.nombre} 👋

Te recordamos que tienes una deuda pendiente de *${fmtM(deuda)}* con dbarrio.

Cuando puedas, coordina el pago para mantener tu cuenta al día.

— dbarrio`;

  wa(soc.telefono, msg);
}

// ══════════════════════════════════════════
// SOPORTE
// ══════════════════════════════════════════
async function loadSoporte() {
  const elGar = document.getElementById('lista-gar');
  const elRec = document.getElementById('lista-gar-rec');

  elGar.innerHTML = '<div class="loading">Cargando...</div>';
  elRec.innerHTML = '<div class="loading">Cargando...</div>';

  // 1) Garantías informativas desde solicitudes (completadas y con garantía > 0)
  const { data: solicitudes, error: e1 } = await sb
    .from('solicitudes')
    .select('id, telefono, fecha_fin, garantia_dias, garantia_expira, socio_asignado')
    .eq('estado','completada')
    .gt('garantia_dias', 0)
    .order('fecha_fin', { ascending: false })
    .limit(200);

  if (e1) {
    elGar.innerHTML = `<div class="empty">Error: ${esc(e1.message)}</div>`;
  } else if (!solicitudes?.length) {
    elGar.innerHTML = '<div class="empty">Sin garantías registradas</div>';
  } else {
    elGar.innerHTML = solicitudes.map(s => {
      const socio = s.socio_asignado ? (sociosMap[s.socio_asignado]?.nombre || '—') : '—';
      const hoy = new Date();
      const exp = s.garantia_expira ? new Date(s.garantia_expira) : null;
      const vencida = exp ? exp < hoy : false;

      return `
<div class="soporte-card">
  <div class="soporte-hdr" onclick="toggleSoporteCard(this)">
    <div class="soporte-hdr-left">
      <div class="soporte-title">${esc(dbc(s.id))} · ${esc(s.telefono || '')}</div>
      <div class="soporte-meta">${fmtD(s.fecha_fin)} · ${s.garantia_dias ?? 0} días</div>
    </div>
    <svg class="card-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="soporte-body">
    <div style="margin-top:6px;font-size:13px">👤 Socio: ${esc(socio)}</div>
    <div style="margin-top:6px;font-size:13px;font-weight:700;color:var(--ok)">
  🛡 Garantía registrada
  ${exp ? ' · Vence: ' + exp.toLocaleDateString('es-ES') : ''}
</div>
  </div>
</div>`;
    }).join('');
  }

  // 2) Reclamos reales desde garantia_reclamos
  const { data: reclamos, error: e2 } = await sb
    .from('garantia_reclamos')
    .select('id, created_at, telefono, codigo_servicio, solicitud_id, mensaje, estado, admin_nota, socio_id, resuelto_ts')
    .order('created_at', { ascending: false })
    .limit(200);

  if (e2) {
    elRec.innerHTML = `<div class="empty">Error: ${esc(e2.message)}</div>`;
  } else if (!reclamos?.length) {
    elRec.innerHTML = '<div class="empty">Sin reclamos</div>';
  } else {
    elRec.innerHTML = reclamos.map(r => {
      const socio = r.socio_id ? (sociosMap[r.socio_id]?.nombre || '—') : '—';
      const chipClass = {pendiente:'cp',en_proceso:'ce',resuelto:'ca',rechazado:'cr'}[r.estado] || 'cp';

      return `
<div class="soporte-card">
  <div class="soporte-hdr" onclick="toggleSoporteCard(this)">
    <div class="soporte-hdr-left">
      <div class="soporte-title">${esc(r.codigo_servicio || ('db-'+(r.solicitud_id||'')))} · ${esc(r.telefono || '')}</div>
      <div class="soporte-meta">${fmt(r.created_at)} · <span class="chip ${chipClass}">${esc(r.estado)}</span></div>
    </div>
    <svg class="card-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

  <div class="soporte-body">
    <div style="margin-top:6px;font-size:13px"><strong>Falla:</strong> ${esc(r.mensaje)}</div>
    <div style="margin-top:6px;font-size:13px">👤 Socio: ${esc(socio)}</div>

    <div class="actions-row" style="margin-top:10px;flex-wrap:wrap">
      ${r.estado !== 'resuelto' ? `<button class="btn btn-y btn-sm" onclick="setReclamoEstado(${r.id}, 'en_proceso')">En proceso</button>` : ''}
      ${r.estado !== 'resuelto' ? `<button class="btn btn-k btn-sm" onclick="resolverReclamo(${r.id})">Marcar resuelto</button>` : ''}
      <button class="btn btn-g btn-sm" onclick="notaReclamo(${r.id})">Nota</button>
    </div>
  </div>
</div>`;
    }).join('');
  }
}

// Acciones
async function setReclamoEstado(id, estado){
  const { error } = await sb.from('garantia_reclamos').update({ estado }).eq('id', id);
  if(error){ toast('Error: '+error.message); return; }
  toast('Actualizado');
  loadSoporte();
}

async function resolverReclamo(id){
  const { error } = await sb.from('garantia_reclamos').update({
    estado: 'resuelto',
    resuelto_ts: new Date().toISOString()
  }).eq('id', id);

  if(error){ toast('Error: '+error.message); return; }
  toast('Reclamo resuelto');
  loadSoporte();
}

async function notaReclamo(id){
  const nota = prompt('Nota admin (opcional):');
  if(nota === null) return;

  const { error } = await sb.from('garantia_reclamos').update({
    admin_nota: nota.trim() || null
  }).eq('id', id);

  if(error){ toast('Error: '+error.message); return; }
  toast('Nota guardada');
  loadSoporte();
}

// ══════════════════════════════════════════
// AJUSTES
// ══════════════════════════════════════════
function loadAjsUI() {
  document.getElementById('aj-wa').value  = CFG.wa;
  document.getElementById('aj-com').value = CFG.com;
  document.getElementById('aj-t1').value  = CFG.t1;
  document.getElementById('aj-t2').value  = CFG.t2;
  document.getElementById('aj-t3').value  = CFG.t3;
}
function saveWA() { CFG.wa=document.getElementById('aj-wa').value.trim(); toast('Numero guardado') }
function saveComision() { CFG.com=parseFloat(document.getElementById('aj-com').value)||15; toast('Comision guardada') }
function saveTemplates() { CFG.t1=document.getElementById('aj-t1').value; CFG.t2=document.getElementById('aj-t2').value; CFG.t3=document.getElementById('aj-t3').value; toast('Templates guardados') }
// ===== KPI SAFE SETTERS (nunca muestra "—") =====
function setKpis({ pend=0, asig=0, comp=0, caja=0 } = {}) {
  const nPend = document.getElementById('kpiPend');
  const nAsig = document.getElementById('kpiAsig');
  const nComp = document.getElementById('kpiComp');
  const nCaja = document.getElementById('kpiCaja');

  if (nPend) nPend.textContent = Number.isFinite(+pend) ? String(+pend) : '0';
  if (nAsig) nAsig.textContent = Number.isFinite(+asig) ? String(+asig) : '0';
  if (nComp) nComp.textContent = Number.isFinite(+comp) ? String(+comp) : '0';

  // Caja: deja $0 si no hay número
  const c = Number(caja);
  if (nCaja) nCaja.textContent = Number.isFinite(c) ? ('$' + c.toFixed(0)) : '$0';
}

// Pon 0s desde el arranque (evita guiones mientras carga)
setKpis({ pend:0, asig:0, comp:0, caja:0 });
</script>
