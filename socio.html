<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#1A1A2E"/>
<title>dbarrio &mdash; t&eacute;cnico</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --y:#F5C116;--yd:#C9980D;
  --y-bg:rgba(245,193,22,.12);

  --ink:#1A1A2E;--ink2:#24243C;--ink3:#454562;

  /* bajo el sol: fondo claro + card blanca real */
  --bg:#F4F2EE;
  --card:#FFFFFF;
  --line:rgba(28,28,46,.12);

  --g1:rgba(28,28,46,.55);
  --g2:rgba(28,28,46,.25);

  --ok:#1E7A5A;--ok-bg:rgba(78,203,160,.12);
  --err:#E05C5C;--err-bg:rgba(224,92,92,.12);

  --wa:#25D366;

  --r:16px;--rs:12px;
  --f:'DM Sans',system-ui,sans-serif;
  --fd:'Barlow Condensed',system-ui,sans-serif;

  --th:54px;--nav:62px;
}

html{background:var(--ink)}
body{
  min-height:100svh;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--f);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* =========================
   TOPBAR (safe-area OK)
   ========================= */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  height:calc(var(--th) + env(safe-area-inset-top,0));
  padding:env(safe-area-inset-top,0) 16px 0;
  background:var(--ink);
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.brand{display:flex;align-items:center;gap:10px;flex:0 0 auto}
.brand-mark{
  font-family:var(--fd);
  font-size:28px;
  font-weight:900;
  color:var(--y);
  letter-spacing:-2px;
  line-height:1;
}
.brand-name{
  font-family:var(--fd);
  font-size:16px;
  font-weight:900;
  color:rgba(255,255,255,.78);
  letter-spacing:.3px;
}

/* nombre usuario */
.tb-nombre{
  flex:1;
  min-width:0;
  text-align:right;
  margin-right:10px;
  font-size:12px;
  font-weight:700;
  color:rgba(255,255,255,.55);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* botón salir premium */
.tb-exit{
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.20);
  color: rgba(255,255,255,.92);
  border-radius: 12px;
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
  font-family: var(--f);
  -webkit-tap-highlight-color:transparent;
  box-shadow: 0 12px 26px rgba(0,0,0,.22);
}
.tb-exit:active{transform:scale(.98);opacity:.92}

/* =========================
   CONTENT (safe-area OK)
   ========================= */
.content{
  padding-top:calc(var(--th) + env(safe-area-inset-top,0));
  padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom,0) + 12px);
}
/* =========================
   TABS
   ========================= */
.tab{display:none;padding:14px 14px 0}
.tab.active{display:block}

/* BOTTOM NAV (fix: no se encoge con safe-area) */
.bottom-nav{
  position:fixed;
  left:0; right:0; bottom:0;
  z-index:50;

  background:var(--ink);
  display:flex;

  border-top:2px solid var(--y);

  /* altura real = nav + safe area */
  height:calc(var(--nav) + env(safe-area-inset-bottom,0));
  padding-bottom:env(safe-area-inset-bottom,0);
}
/* =========================
   CARDS (legible bajo sol)
   ========================= */
.card{
  background:var(--card);
  border-radius:18px;
  border:1px solid rgba(28,28,46,.10);
  border-left:4px solid var(--y);
  box-shadow: 0 16px 34px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.05);
  margin-bottom:12px;
  overflow:hidden;
}

.card-hdr{
  display:flex;align-items:center;
  padding:13px 14px;
  cursor:pointer;
  gap:10px;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  background: linear-gradient(180deg, rgba(245,193,22,.12), rgba(245,193,22,0));
}
.card-hdr:active{background:rgba(0,0,0,.02)}

.card-top{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.card-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}

.card-code{
  font-family:var(--fd);
  font-size:15px;
  font-weight:900;
  color:rgba(28,28,46,.95);
  letter-spacing:.3px;
}

.card-meta{
  font-size:11px;
  color:rgba(28,28,46,.55);
  display:flex;gap:8px;flex-wrap:wrap;
}

.card-toggle{
  font-size:17px;
  color:rgba(28,28,46,.30);
  flex-shrink:0;
  transition:transform .2s;
}
.card.open .card-toggle{transform:rotate(180deg)}

.card-body{
  display:none;
  padding:0 14px 14px;
  border-top:1px solid rgba(28,28,46,.10);
}
.card.open .card-body{display:block}

/* =========================
   FIELDS
   ========================= */
.fields{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 14px;
  padding:12px 0 12px;
}
.field{display:flex;flex-direction:column;gap:2px}
.field.full{grid-column:1/-1}

.f-lbl{
  font-size:10px;
  font-weight:900;
  color:rgba(28,28,46,.55);
  text-transform:uppercase;
  letter-spacing:.45px;
}
.f-val{
  font-size:13px;
  font-weight:650;
  color:rgba(28,28,46,.92);
  line-height:1.4;
}

/* =========================
   INLINE FORMS
   ========================= */
.ifrm{
  display:none;
  background:rgba(28,28,46,.03);
  border-radius:14px;
  padding:14px;
  margin-top:10px;
  border:1px solid rgba(28,28,46,.10);
}
.ifrm.open{display:block}

.ifrm-title{
  font-size:11px;
  font-weight:900;
  color:rgba(28,28,46,.70);
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:10px;
}

/* =========================
   CHIPS
   ========================= */
.chip{
  display:inline-flex;align-items:center;
  padding:4px 9px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  letter-spacing:.25px;
  white-space:nowrap;
  text-transform:uppercase;
}
.ca{background:var(--y-bg);color:#7A5800}
.ce{background:var(--ok-bg);color:var(--ok)}

/* =========================
   FORM INPUTS
   ========================= */
.fg{margin-bottom:11px}
.flbl{
  display:block;
  font-size:10px;
  font-weight:900;
  color:rgba(28,28,46,.55);
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:4px;
}

textarea, input, select{
  width:100%;
  padding:10px 12px;
  border:1.5px solid rgba(28,28,46,.14);
  border-radius:12px;
  font-size:14px;
  font-family:var(--f);
  background:#fff;
  color:var(--ink);
  -webkit-appearance:none;
}
textarea{resize:vertical;min-height:60px}
textarea:focus, input:focus, select:focus{
  outline:none;
  border-color:var(--y);
  box-shadow:0 0 0 3px rgba(245,193,22,.18);
}

/* =========================
   ACTIONS + BUTTONS (vida)
   ========================= */
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:12px;
}

/* base button */
.btn{
  flex:1 1 auto;
  min-height:44px;
  border-radius:14px;
  padding:11px 14px;
  font-size:13px;
  font-weight:900;
  font-family:var(--f);
  cursor:pointer;
  border:1px solid rgba(28,28,46,.10);
  background:#F2F2F4;
  color:rgba(28,28,46,.92);
  box-shadow: 0 10px 22px rgba(0,0,0,.10);
  -webkit-tap-highlight-color:transparent;
  position:relative;
  transform:translateZ(0);
  transition:transform .12s, opacity .12s;
}
.btn:active{transform:scale(.98);opacity:.95}

/* full width helper */
.actions .btn.full{flex: 1 1 100%}

/* shine */
.btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: linear-gradient(180deg, rgba(255,255,255,.26), rgba(255,255,255,0));
  opacity:.10;
  pointer-events:none;
}

/* specific variants */
.btn-dark{
  background:var(--ink);
  color:#fff;
  border:1px solid rgba(255,255,255,.10);
  box-shadow: 0 14px 28px rgba(28,28,46,.25);
}
.btn-yellow{
  background:var(--y);
  color:rgba(28,28,46,.95);
  border:1px solid rgba(0,0,0,.06);
  box-shadow: 0 14px 28px rgba(245,193,22,.22);
}
.btn-yellow:active{opacity:.92}

.btn-ghost{
  background:rgba(28,28,46,.06);
  border:1px solid rgba(28,28,46,.12);
  color:rgba(28,28,46,.88);
  box-shadow:none;
}

.btn-wa{
  background:var(--wa);
  color:#fff;
  border:1px solid rgba(0,0,0,.08);
  box-shadow: 0 16px 34px rgba(37,211,102,.22);
}

/* botón “Reporte de cierre” */
.btn-soft{
  background:rgba(28,28,46,.06);
  border:1px solid rgba(28,28,46,.14);
  color:rgba(28,28,46,.92);
  box-shadow:none;
}

/* botones estado */
.btn-state{
  background:#F2F2F4;
  border:1px solid rgba(28,28,46,.16);
  color:rgba(28,28,46,.92);
  font-weight:950;
}
.btn-state.primary{
  background:var(--ink);
  color:#fff;
  border:1px solid rgba(255,255,255,.10);
  box-shadow: 0 14px 28px rgba(28,28,46,.25);
}

/* peligro */
.btn-danger{
  background:rgba(224,92,92,.12);
  border:1px solid rgba(224,92,92,.30);
  color:rgba(224,92,92,.95);
  box-shadow:none;
}

/* disabled */
.btn:disabled{
  opacity:.55;
  cursor:not-allowed;
  box-shadow:none;
}

.dir-row{
  display:flex;
  align-items:center;
  gap:6px;
}

.gps-mini{
  cursor:pointer;
  font-size:16px;
  line-height:1;
  opacity:.75;
  transition:transform .1s, opacity .1s;
}

.gps-mini:active{
  transform:scale(.9);
  opacity:1;
}

/* =========================
   CUENTA
   ========================= */
.cuenta-card{
  background:var(--card);
  border-radius:18px;
  border:1px solid rgba(28,28,46,.10);
  box-shadow: 0 16px 34px rgba(0,0,0,.10), 0 0 0 1px rgba(0,0,0,.04);
  padding:20px;
  margin-bottom:12px;
}
.cuenta-nombre{
  font-family:var(--fd);
  font-size:26px;
  font-weight:900;
  color:rgba(28,28,46,.95);
  margin-bottom:4px
}
.cuenta-tag{font-size:12px;color:rgba(28,28,46,.55)}

.cuenta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.cg-item{display:flex;flex-direction:column;gap:3px}
.cg-lbl{font-size:10px;font-weight:900;color:rgba(28,28,46,.55);text-transform:uppercase;letter-spacing:.4px}
.cg-val{font-size:18px;font-weight:900;color:rgba(28,28,46,.95);font-family:var(--fd)}
.cg-val.deuda-activa{color:var(--err)}
.cg-val.deuda-cero{color:var(--ok)}

/* =========================
   HISTORIAL
   ========================= */
.hist-card{
  background:var(--card);
  border-radius:18px;
  border:1px solid rgba(28,28,46,.10);
  border-left:4px solid rgba(28,28,46,.18);
  box-shadow: 0 14px 30px rgba(0,0,0,.10), 0 0 0 1px rgba(0,0,0,.04);
  padding:14px;
  margin-bottom:10px;
  display:flex;align-items:center;gap:12px;
}
.hist-info{flex:1;min-width:0}
.hist-code{font-family:var(--fd);font-size:14px;font-weight:900;color:rgba(28,28,46,.95)}
.hist-meta{font-size:11px;color:rgba(28,28,46,.55);margin-top:2px}
.hist-right{text-align:right;flex-shrink:0}
.hist-monto{font-family:var(--fd);font-size:16px;font-weight:900;color:var(--ok)}
.hist-stars{font-size:12px;color:var(--y)}

/* =========================
   EMPTY / LOADING
   ========================= */
.vacio{text-align:center;padding:36px 20px;font-size:14px;color:rgba(28,28,46,.55)}
.cargando{text-align:center;padding:28px;font-size:13px;color:rgba(28,28,46,.55)}

function cardOrden(s) {
  const cid = 'or' + s.id;

  const enP = s.sub_estado === 'en_proceso';
  const rep = s.sub_estado === 'cierre_reportado';
  const rej = s.sub_estado === 'rechazada_por_socio';

  const chip =
    rep ? '<span class="chip ce">Cierre reportado</span>' :
    rej ? '<span class="chip ce" style="background:var(--err-bg);color:var(--err)">Rechazo enviado</span>' :
    enP ? '<span class="chip ce">En proceso</span>' :
          '<span class="chip ca">Asignada</span>';

  const avisoCierre = rep ? `
    <div style="background:var(--ok-bg);border:1px solid rgba(78,203,160,.3);border-radius:10px;padding:10px 12px;margin:10px 0;font-size:12px;font-weight:900;color:var(--ok)">
      ✅ Ya enviaste el reporte de cierre. Espera la aprobación del admin.
    </div>
  ` : '';

  const avisoRechazo = rej ? `
    <div style="background:var(--err-bg);border:1px solid rgba(224,92,92,.25);border-radius:10px;padding:10px 12px;margin:10px 0;font-size:12px;font-weight:900;color:var(--err)">
      ❌ Marcaste "No puedo atender". Queda pendiente de reasignación por el admin.
    </div>
  ` : '';

  const cierreForm = (!rep && !rej) ? `
    <div class="fg">
      <label class="flbl">Monto cobrado ($)</label>
      <input id="monto-cierre-${s.id}" type="number" min="0" step="0.01" placeholder="0.00"/>
    </div>

    <div class="fg">
      <label class="flbl">Garantía (días)</label>
      <input id="gar-cierre-${s.id}" type="number" min="0" step="1" placeholder="0"/>
    </div>

    <div class="fg">
      <label class="flbl">Detalle del trabajo</label>
      <textarea id="nt-cierre-${s.id}" placeholder="Describe lo realizado..."></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-yellow full" onclick="stop(event); reportarCierre(${s.id}, this)">Enviar reporte</button>
    </div>
  ` : `
    <div class="actions">
      <button class="btn btn-ghost full" disabled>Reporte enviado</button>
    </div>
  `;

  return `
  <div class="card" id="${cid}">
    <div class="card-hdr" onclick="toggleCard('${cid}')">
      <div class="card-top">
        <div class="card-row">${chip}<span class="card-code">${dbc(s.id)}</span></div>
        <div class="card-meta">
          <span>${esc(s.cliente)}</span>
          ${s.municipio ? `<span>${esc(s.municipio)}</span>` : ''}
          <span>${fmt(s.fecha_ts)}</span>
        </div>
      </div>
      <span class="card-toggle">▾</span>
    </div>

    <div class="card-body">
      <div class="fields">
        <div class="field">
          <span class="f-lbl">Servicio</span>
          <span class="f-val">${esc(s.servicio || '—')}</span>
        </div>

        <div class="field">
          <span class="f-lbl">Municipio</span>
          <span class="f-val">${esc(s.municipio || '—')}</span>
        </div>

        <div class="field">
          <span class="f-lbl">Teléfono</span>
          <span class="f-val">
            ${s.telefono
              ? `<a href="tel:${esc(s.telefono)}" style="color:var(--ink);font-weight:900;font-size:15px">${esc(s.telefono)}</a>`
              : '—'}
          </span>
        </div>

        ${s.direccion ? `
        <div class="field full">
          <span class="f-lbl">Dirección</span>
          <span class="f-val dir-row">
            ${esc(s.direccion)}
            <span class="gps-mini" onclick="stop(event); openGPS(${s.id})" title="Abrir mapa">📍</span>
          </span>
        </div>` : ''}

        ${s.detalles ? `
        <div class="field full">
          <span class="f-lbl">Detalles</span>
          <span class="f-val">${esc(s.detalles)}</span>
        </div>` : ''}

        ${s.nota_admin ? `
        <div class="field full">
          <span class="f-lbl">Nota del admin</span>
          <span class="f-val">${esc(s.nota_admin)}</span>
        </div>` : ''}
      </div>

      <div class="actions">
        <button class="btn btn-soft full" onclick="stop(event); toggleCierre(event, ${s.id})">Reporte de cierre</button>
      </div>

      <div class="ifrm" id="ifrm-cierre-${s.id}">
        <div class="ifrm-title">Reporte de cierre (lo que cobraste y garantía)</div>
        ${avisoCierre}
        ${avisoRechazo}
        ${cierreForm}
      </div>

      <div class="ifrm" id="ifrm-nopuedo-${s.id}">
        <div class="ifrm-title">¿Por qué no puedes atender?</div>
        <div class="fg"><textarea id="nt-nopuedo-${s.id}" placeholder="Motivo..."></textarea></div>
        <div class="actions">
          <button class="btn btn-danger full" onclick="stop(event); confNoPuedo(${s.id})">Confirmar</button>
          <button class="btn btn-ghost full" onclick="stop(event); closeF('nopuedo',${s.id})">Cancelar</button>
        </div>
      </div>

      <div class="actions">
        ${(!enP && !rej && !rep) ? `
          <button class="btn btn-yellow full" onclick="stop(event); marcarEnProceso(${s.id})">Llegué / En proceso</button>
        ` : ''}

        ${s.telefono ? `
          <button class="btn btn-state primary" onclick="stop(event); waCliente(${s.id}, 'encamino')">Voy en camino</button>
          <button class="btn btn-state" onclick="stop(event); waCliente(${s.id}, 'coordinar')">Coordinar hora</button>
          <button class="btn btn-state" onclick="stop(event); waCliente(${s.id}, 'aqui')">Estoy aquí</button>
        ` : ''}

        <button class="btn btn-wa full" onclick="stop(event); waAdmin(${s.id})">${svgWA()} Admin</button>

        ${!rej ? `
          <button class="btn btn-danger full" onclick="stop(event); openF('nopuedo',${s.id})">No puedo atender</button>
        ` : `
          <button class="btn btn-ghost full" disabled>Ya notificaste</button>
        `}
      </div>
    </div>
  </div>`;
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-mark">db</span>
    <span class="brand-name">dbarrio</span>
  </div>

  <span class="tb-nombre" id="tbNombre">—</span>

  <button class="tb-exit" onclick="exitSocio()">Salir</button>
</header>

<div id="dbg" style="padding:10px 14px;color:var(--err);font-size:12px"></div>

<div class="content">
  <div class="tab active" id="tab-ordenes">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span style="font-family:var(--fd);font-size:22px;font-weight:900;color:var(--ink)">Mis &oacute;rdenes</span>
      <button style="background:var(--line);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f)" onclick="loadOrdenes()">&#8635; Actualizar</button>
    </div>
    <div id="listaOrd"><div class="cargando">Cargando...</div></div>
  </div>

  <div class="tab" id="tab-historial">
    <div style="margin-bottom:14px"><span style="font-family:var(--fd);font-size:22px;font-weight:900;color:var(--ink)">Mi historial</span></div>
    <div id="listaHist"><div class="cargando">Cargando...</div></div>
  </div>

  <div class="tab" id="tab-cuenta">
    <div style="margin-bottom:14px"><span style="font-family:var(--fd);font-size:22px;font-weight:900;color:var(--ink)">Mi cuenta</span></div>
    <div id="cuentaContent"><div class="cargando">Cargando...</div></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="bnav-btn active" id="bnav-ordenes" onclick="goTab('ordenes',this)">
    <svg class="bnav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="bnav-lbl">&Oacute;rdenes</span>
  </button>
  <button class="bnav-btn" id="bnav-historial" onclick="goTab('historial',this)">
    <svg class="bnav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="bnav-lbl">Historial</span>
  </button>
  <button class="bnav-btn" id="bnav-cuenta" onclick="goTab('cuenta',this)">
    <svg class="bnav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span class="bnav-lbl">Mi cuenta</span>
  </button>

document.addEventListener('DOMContentLoaded', async () => {

    const refresh_token = p.get('refresh_token');

    if (access_token && refresh_token) {

async function reportarCierre(id, btn) {
  if (sendingCierre[id]) return;

  const setBtn = (on) => {
    if (!btn) return;
    btn.disabled = on;
    btn.textContent = on ? 'Enviando...' : 'Enviar reporte';
  };

  try {
    sendingCierre[id] = true;
    setBtn(true);

    const monto = parseFloat(document.getElementById('monto-cierre-' + id)?.value);
    const gar   = parseInt(document.getElementById('gar-cierre-' + id)?.value || '0', 10);
    const nota  = (document.getElementById('nt-cierre-' + id)?.value || '').trim();

    if (!Number.isFinite(monto) || monto <= 0) { alert('Monto inválido'); return; }
    if (!Number.isFinite(gar) || gar < 0)      { alert('Garantía inválida'); return; }
    if (!nota)                                  { alert('Describe el trabajo realizado'); return; }

    const { error } = await sb.from('solicitudes').update({
      monto_socio: monto,
      garantia_dias: gar,
      nota_socio: nota,
      cierre_ts: new Date().toISOString(),
      sub_estado: 'cierre_reportado',
      solicita_cierre: false
    }).eq('id', id);

    if (error) { alert('Error: ' + error.message); return; }

    alert('Reporte enviado al admin ✅');
    await loadOrdenes();

  } catch (e) {
    console.error(e);
    alert('Error inesperado. Reintenta.');
  } finally {
    sendingCierre[id] = false;
    setBtn(false);
  }
}

async function confNoPuedo(id) {
  const nota = document.getElementById('nt-nopuedo-'+id).value.trim();
  if (!nota) return alert('Escribe el motivo');

  const { error } = await sb.from('solicitudes').update({
    sub_estado: 'rechazada_por_socio',
    motivo_rechazo_socio: nota,
    rechazo_socio_ts: new Date().toISOString()
  }).eq('id', id);

  if (error) { alert('Error: ' + error.message); return; }

  alert('Aviso enviado al admin. Queda pendiente de reasignaci\u00f3n.');
  loadOrdenes();
}

async function waCliente(idOrden, tipo) {
  const { data:s, error } = await sb
    .from('solicitudes')
    .select('cliente,telefono,servicio,municipio')
    .eq('id', idOrden)
    .maybeSingle();

  if (error || !s?.telefono) {
    alert('No hay teléfono del cliente.');
    return;
  }

  const cli = s.cliente || 'cliente';
  const srv = s.servicio || 'servicio';
  const mun = s.municipio || 'tu zona';

  let msg = '';
  if (tipo === 'encamino') {
    msg = `Hola ${cli}, soy tu técnico de dbarrio.\n✅ Voy en camino por ${srv} (${mun}).\n¿Me confirmas dirección y referencia?`;
  } else if (tipo === 'coordinar') {
    msg = `Hola ${cli}, soy tu técnico de dbarrio.\n🕒 Para coordinar: ¿te viene bien ahora o prefieres en 30–60 min?\nServicio: ${srv} (${mun}).`;
  } else { // aqui
    msg = `Hola ${cli}, soy tu técnico de dbarrio.\n📍 Ya estoy en el lugar.\n¿Puedes salir o confirmarme la puerta / referencia?`;
  }

  openWA(s.telefono, msg);
}

function openWA(num, txt) {
  const n = String(num).replace(/\D/g,'');
  const url = 'https://wa.me/' + n + '?text=' + encodeURIComponent(txt);
  window.location.href = url; // Safari-friendly
}

async function openGPS(idOrden){
  const { data:s, error } = await sb
    .from('solicitudes')
    .select('direccion,municipio')
    .eq('id', idOrden)
    .maybeSingle();

  if (error) return alert('Error leyendo dirección: ' + error.message);

  const dir = (s?.direccion || '').trim();
  const mun = (s?.municipio || '').trim();

  // Si no hay dirección, al menos abre el municipio
  const q = (dir ? `${dir}, ${mun}` : mun).trim();
  if (!q) return alert('Esta orden no tiene dirección ni municipio.');

  const enc = encodeURIComponent(q);

  // Preferencia: Google Maps (funciona bien en iPhone y Android)
  const gmaps = `https://www.google.com/maps/search/?api=1&query=${enc}`;

  // Alternativa: Apple Maps
  const amaps = `https://maps.apple.com/?q=${enc}`;

  // Safari-friendly: navegar en la misma pestaña
  // Puedes cambiar a amaps si prefieres Apple Maps
  window.location.href = gmaps;
}

function toggleCard(id){document.getElementById(id)?.classList.toggle('open')}
function openF(tipo,id){
  ['cierre','nopuedo'].forEach(t=>{document.getElementById('ifrm-'+t+'-'+id)?.classList.remove('open')});
